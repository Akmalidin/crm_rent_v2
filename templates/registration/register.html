<!-- templates/registration/register.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center">
    
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">🎉 Добро пожаловать!</h1>
            <p class="text-gray-600">Создайте аккаунт для начала работы</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Имя пользователя</label>
                <input type="text" name="username" required
                       class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-4 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="admin">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <input type="email" name="email"
                       class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-4 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="admin@example.com">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Пароль</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-4 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="••••••••">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Подтвердите пароль</label>
                <input type="password" name="password_confirm" required
                       class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-4 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="••••••••">
            </div>
            
            <button type="submit"
                    class="w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-bold text-lg hover:from-blue-700 hover:to-purple-700 shadow-lg">
                Создать аккаунт
            </button>
        </form>
        
        <p class="text-center mt-6 text-gray-600">
            Уже есть аккаунт? 
            <a href="{% url 'login' %}" class="text-blue-600 hover:text-blue-700 font-semibold">Войти</a>
        </p>
    </div>

</body>
</html>
