{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Аренда инструментов</title>
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="{% static 'icons/icon-192.png' %}">
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f17; color: #e2e2f0;
        min-height: 100dvh; display: flex; align-items: center; justify-content: center;
        padding: 20px;
    }
    .login-card {
        background: #1e1e2e; border: 1px solid #2d2d44; border-radius: 20px;
        padding: 40px 32px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-icon { font-size: 48px; margin-bottom: 16px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: #a0a0b8; margin-bottom: 28px; }
    .login-input {
        width: 100%; padding: 14px 18px; background: #0f0f17; border: 1px solid #2d2d44;
        border-radius: 12px; color: #e2e2f0; font-size: 18px; font-weight: 600;
        text-align: center; letter-spacing: 1px; outline: none; margin-bottom: 16px;
    }
    .login-input:focus { border-color: #7c3aed; }
    .login-input::placeholder { color: #6c6c88; font-size: 14px; font-weight: 400; letter-spacing: 0; }
    .login-btn {
        width: 100%; padding: 14px; background: #7c3aed; color: #fff;
        border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
        cursor: pointer; transition: background .15s;
    }
    .login-btn:hover { background: #6d28d9; }
    .login-error {
        background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
        color: #f87171; border-radius: 10px; padding: 10px 14px; font-size: 14px;
        margin-bottom: 16px;
    }
    .login-hint { font-size: 12px; color: #6c6c88; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-icon">🔧</div>
        <div class="login-title">Аренда инструментов</div>
        <div class="login-sub">Введите номер телефона для входа</div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="tel" name="phone" class="login-input"
                   placeholder="+996 555 123 456" autocomplete="tel"
                   value="{{ request.POST.phone }}" autofocus>
            <button type="submit" class="login-btn">Войти</button>
        </form>

        <div class="login-hint">
            Введите номер, который указан в вашем профиле клиента
        </div>
    </div>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/service-worker.js').catch(() => {});
    }
    </script>
</body>
</html>
