<!-- templates/base/base.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM Аренда{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100">
    
    <!-- ИСПРАВЛЕННАЯ МОБИЛЬНАЯ ВЕРСИЯ NAVBAR -->
<!-- Полная замена navbar в templates/base.html -->

<style>
/* Navbar базовые стили */
.modern-navbar {
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #6366f1 100%);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
}

.nav-link {
    position: relative;
    color: rgba(255, 255, 255, 0.85);
    font-weight: 500;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}

.nav-link:hover {
    color: white;
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
}

.nav-link.active {
    color: white;
    background: rgba(255, 255, 255, 0.2);
}

.nav-icon {
    font-size: 24px;
}

.nav-label {
    font-size: 13px;
    font-weight: 500;
}

.logo-section {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.5rem 1rem;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
}

.logo-icon {
    font-size: 32px;
}

.logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: white;
}

/* Desktop navigation */
.desktop-nav {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

/* Mobile Menu Button */
.mobile-menu-btn {
    display: none;
    background: rgba(255, 255, 255, 0.15);
    border: none;
    color: white;
    padding: 0.75rem;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.mobile-menu-btn:hover {
    background: rgba(255, 255, 255, 0.25);
}

.mobile-menu-btn:active {
    transform: scale(0.95);
}

/* Mobile Overlay */
.mobile-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: 998;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.mobile-overlay.show {
    display: block;
    opacity: 1;
}

/* Mobile Menu */
.mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    right: -100%;
    width: 85%;
    max-width: 360px;
    height: 100vh;
    background: linear-gradient(180deg, #1e40af 0%, #3b82f6 100%);
    box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
    z-index: 999;
    transition: right 0.3s ease;
    overflow-y: auto;
    padding: 2rem 1rem;
}

.mobile-menu.show {
    display: block;
    right: 0;
}

.mobile-menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

.mobile-menu-title {
    font-size: 20px;
    font-weight: 700;
    color: white;
}

.mobile-close-btn {
    background: rgba(255, 255, 255, 0.15);
    border: none;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    line-height: 1;
}

.mobile-close-btn:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: rotate(90deg);
}

.mobile-nav-links {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.mobile-nav-link {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    color: rgba(255, 255, 255, 0.9);
    border-radius: 12px;
    transition: all 0.3s ease;
    text-decoration: none;
}

.mobile-nav-link:hover {
    background: rgba(255, 255, 255, 0.15);
    color: white;
}

.mobile-nav-link.active {
    background: rgba(255, 255, 255, 0.2);
    color: white;
}

.mobile-nav-icon {
    font-size: 28px;
    width: 40px;
    text-align: center;
}

.mobile-nav-label {
    font-size: 16px;
    font-weight: 500;
}

/* Hide desktop search on mobile */
.desktop-search {
    display: flex;
}

/* Media Queries */
@media (max-width: 1024px) {
    .desktop-nav {
        display: none !important;
    }
    
    .desktop-search {
        display: none !important;
    }
    
    .mobile-menu-btn {
        display: block;
    }
}

@media (max-width: 640px) {
    .logo-text {
        font-size: 18px;
    }
    
    .logo-icon {
        font-size: 28px;
    }
}
</style>

<nav class="modern-navbar py-3 px-4 md:px-6 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        
        <!-- Logo -->
        <a href="/" class="logo-section">
            <span class="logo-icon">🔧</span>
            <div>
                <div class="logo-text">CRM Аренда</div>
            </div>
        </a>

        <!-- Desktop Navigation -->
        <div class="desktop-nav">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </a>
            
            <a href="/clients/" class="nav-link {% if 'clients' in request.path %}active{% endif %}">
                <span class="nav-icon">👥</span>
                <span class="nav-label">Клиенты</span>
            </a>
            
            <a href="/rental/orders/" class="nav-link {% if 'orders' in request.path %}active{% endif %}">
                <span class="nav-icon">📦</span>
                <span class="nav-label">Заказы</span>
            </a>
            
            <a href="/rental/returns/" class="nav-link {% if 'returns' in request.path %}active{% endif %}">
                <span class="nav-icon">⬅️</span>
                <span class="nav-label">Возвраты</span>
            </a>
            
            <a href="/payment/" class="nav-link {% if 'payment' in request.path %}active{% endif %}">
                <span class="nav-icon">💰</span>
                <span class="nav-label">Оплаты</span>
            </a>
            
            <a href="/history/" class="nav-link {% if 'history' in request.path %}active{% endif %}">
                <span class="nav-icon">📋</span>
                <span class="nav-label">История</span>
            </a>
            
            <a href="/reports/" class="nav-link {% if 'reports' in request.path %}active{% endif %}">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Отчёты</span>
            </a>
        </div>

        <!-- Desktop Search -->
        <div class="desktop-search relative">
            <div class="flex items-center gap-2 bg-white bg-opacity-20 rounded-xl px-4 py-2 min-w-80">
                <svg class="w-5 h-5 text-white opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
                </svg>
                <input 
                    type="text" 
                    placeholder="Поиск..."
                    autocomplete="off"
                    class="bg-transparent text-white placeholder-white placeholder-opacity-70 outline-none w-full text-sm"
                />
            </div>
        </div>

        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>

    </div>
</nav>

<!-- Mobile Menu Overlay -->
<div class="mobile-overlay" id="mobileOverlay"></div>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-header">
        <div class="mobile-menu-title">📱 Меню</div>
        <button class="mobile-close-btn" id="mobileCloseBtn" type="button">×</button>
    </div>
    
    <div class="mobile-nav-links">
        <a href="/" class="mobile-nav-link {% if request.path == '/' %}active{% endif %}">
            <span class="mobile-nav-icon">🏠</span>
            <span class="mobile-nav-label">Главная</span>
        </a>
        
        <a href="/clients/" class="mobile-nav-link {% if 'clients' in request.path %}active{% endif %}">
            <span class="mobile-nav-icon">👥</span>
            <span class="mobile-nav-label">Клиенты</span>
        </a>
        
        <a href="/rental/orders/" class="mobile-nav-link {% if 'orders' in request.path %}active{% endif %}">
            <span class="mobile-nav-icon">📦</span>
            <span class="mobile-nav-label">Заказы</span>
        </a>
        
        <a href="/rental/returns/" class="mobile-nav-link {% if 'returns' in request.path %}active{% endif %}">
            <span class="mobile-nav-icon">⬅️</span>
            <span class="mobile-nav-label">Возвраты</span>
        </a>
        
        <a href="/payment/" class="mobile-nav-link {% if 'payment' in request.path %}active{% endif %}">
            <span class="mobile-nav-icon">💰</span>
            <span class="mobile-nav-label">Оплаты</span>
        </a>
        
        <a href="/history/" class="mobile-nav-link {% if 'history' in request.path %}active{% endif %}">
            <span class="mobile-nav-icon">📋</span>
            <span class="mobile-nav-label">История</span>
        </a>
        
        <a href="/reports/" class="mobile-nav-link {% if 'reports' in request.path %}active{% endif %}">
            <span class="mobile-nav-icon">📊</span>
            <span class="mobile-nav-label">Отчёты</span>
        </a>
    </div>
</div>

<!-- JAVASCRIPT ДЛЯ МОБИЛЬНОГО МЕНЮ -->
<!-- ВАЖНО: Добавь в конец <body> перед закрывающим тегом -->
<script>
(function() {
    const menuBtn = document.getElementById('mobileMenuBtn');
    const closeBtn = document.getElementById('mobileCloseBtn');
    const overlay = document.getElementById('mobileOverlay');
    const menu = document.getElementById('mobileMenu');
    
    if (!menuBtn || !closeBtn || !overlay || !menu) {
        console.error('Mobile menu elements not found');
        return;
    }
    
    function openMenu() {
        menu.classList.add('show');
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
    }
    
    function closeMenu() {
        menu.classList.remove('show');
        overlay.classList.remove('show');
        document.body.style.overflow = '';
    }
    
    // Открыть меню
    menuBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        openMenu();
    });
    
    // Закрыть по крестику
    closeBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        closeMenu();
    });
    
    // Закрыть по overlay
    overlay.addEventListener('click', function() {
        closeMenu();
    });
    
    // Закрыть по Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && menu.classList.contains('show')) {
            closeMenu();
        }
    });
    
    // Закрыть при переходе по ссылке
    const mobileLinks = menu.querySelectorAll('.mobile-nav-link');
    mobileLinks.forEach(function(link) {
        link.addEventListener('click', function() {
            setTimeout(closeMenu, 100);
        });
    });
})();
</script>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="bg-gray-800 text-white text-center py-4 mt-12">
        <p>© 2026 CRM Аренда Инструментов</p>
    </footer>
    
    {% block extra_js %}
    {% endblock %}
</body>
</html>
