<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нет соединения — CRM Аренда</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --text1: #f1f5f9; --text3: #64748b; --accent: #7c3aed; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text1); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: var(--card); border-radius: 20px; padding: 40px 32px; max-width: 420px; width: 100%; text-align: center; }
  .icon { font-size: 64px; margin-bottom: 24px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
  p { font-size: 15px; color: var(--text3); line-height: 1.6; margin-bottom: 28px; }
  button { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 14px 28px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
  button:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>Нет соединения</h1>
  <p>Проверьте подключение к интернету и попробуйте снова. Данные, которые вы просматривали ранее, могут быть доступны в кэше.</p>
  <button onclick="location.reload()">Повторить попытку</button>
</div>
</body>
</html>
